spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MariaDB
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Disable Redis for tests by using simple cache
spring.cache.type=simple
spring.data.redis.repositories.enabled=false

# Dummy JWT secret for testing
jwt.secret=DummySecretKeyForTestingPurposeOnlyNeedsToBeLongEnoughForHS256Algorithm
jwt.expiration=86400000
jwt.expiration-ms=86400000
# Mock OpenAI API Key
openai.api.key=mock-key
openai.model=gpt-3.5-turbo

# Mock AWS S3
aws.s3.bucket=mock-bucket
aws.s3.region=mock-region
aws.s3.access-key=mock-key
aws.s3.secret-key=mock-secret
aws.accessKey=mock
aws.secretKey=mock
aws.s3.bucket.name=mock
